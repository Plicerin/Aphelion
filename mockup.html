<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aphelion — style mockup v2 (two-scale ASCII vs pixel ramp)</title>
<style>
  :root {
    --bg: #02030a;
    --panel: rgba(10, 16, 32, 0.78);
    --border: rgba(120, 200, 255, 0.22);
    --ink: #cfe7ff;
    --muted: #6b7a99;
    --accent: #7cf7ff;
    --accent-warm: hsl(38, 92%, 68%);
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    overflow: hidden;
    height: 100%;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.85) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 5;
  }
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  #stage { position: fixed; inset: 0; display: block; z-index: 1; }

  #panel {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 6;
    background: var(--panel);
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px 12px;
    width: 250px;
    font-size: 11px;
    line-height: 1.4;
  }
  #panel h1 {
    margin: 0 0 4px;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  #panel .sub {
    margin: 0 0 10px;
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin: 5px 0;
  }
  .row label { color: var(--muted); font-size: 10px; flex: 0 0 70px; letter-spacing: 0.05em; }
  .row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .row .val { width: 32px; text-align: right; color: var(--ink); font-variant-numeric: tabular-nums; font-size: 10px; }
  .toggles {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
    margin-top: 10px;
  }
  .toggles button {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 0;
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .toggles button:hover { background: rgba(124, 247, 255, 0.08); }
  .toggles button.on { background: var(--accent); color: #02030a; border-color: var(--accent); }
  .group-label {
    margin: 12px 0 4px;
    font-size: 8px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>
  <canvas id="stars"></canvas>
  <canvas id="stage"></canvas>

  <div id="panel">
    <h1>◉ STYLE MOCKUP v2</h1>
    <p class="sub">LAVE · AGRICULTURAL · TL5</p>

    <div class="group-label">Tuning</div>
    <div class="row">
      <label>Glow</label>
      <input id="glow" type="range" min="0" max="100" value="75">
      <div class="val" id="glowVal">75</div>
    </div>
    <div class="row">
      <label>World cell</label>
      <input id="worldCell" type="range" min="8" max="22" value="8">
      <div class="val" id="worldCellVal">8</div>
    </div>
    <div class="row">
      <label>Inst cell</label>
      <input id="instCell" type="range" min="5" max="10" value="7">
      <div class="val" id="instCellVal">7</div>
    </div>
    <div class="row">
      <label>Speed</label>
      <input id="speed" type="range" min="0" max="200" value="100">
      <div class="val" id="speedVal">1.0</div>
    </div>

    <div class="group-label">Palette</div>
    <div class="toggles">
      <button data-preset="phosphor" class="on">Phosphor</button>
      <button data-preset="amber">Amber CRT</button>
    </div>
  </div>

<script>
(() => {
  /* =========================================================================
     APHELION — STYLE COMPARISON MOCKUP v2

     Two render scales coexist on screen:
       WORLD layer (chunky ASCII, ~14px cells) — background atmosphere, the
         filled planet disc, stars, dust streaks, the Cobra hull. Each layer
         picks from its own glyph palette so the screen reads as a dense
         ASCII world rather than a brightness ramp.
       INSTRUMENT layer (fine glyph-vector, ~7px cells) — cockpit frame,
         radar ellipse, dashboard gauges, crosshair. These need precision
         that chunky cells can't deliver, but they still use box-drawing
         characters rather than raw vector lines.

     Toggle "Current" vs "Proposed":
       Current  — single cell size for everything, glyphs from the
                  brightness ramp (the existing game pipeline).
       Proposed — two cell sizes, per-layer glyph palettes, filled planet,
                  dense background atmosphere, vivid saturation.
     ========================================================================= */

  const stage = document.getElementById('stage');
  const ctx = stage.getContext('2d', { alpha: false });
  const stars = document.getElementById('stars');
  const sctx = stars.getContext('2d');

  /* ---------- COBRA MK III blueprint ---------- */
  const VERTICES = [
    [  32,    0,   76], [ -32,    0,   76], [   0,   26,   24],
    [-120,   -3,   -8], [ 120,   -3,   -8], [ -88,   16,  -40],
    [  88,   16,  -40], [ 128,   -8,  -40], [-128,   -8,  -40],
    [   0,   26,  -40], [ -32,  -24,  -40], [  32,  -24,  -40],
    [ -36,    8,  -40], [  -8,   12,  -40], [   8,   12,  -40],
    [  36,    8,  -40], [  36,  -12,  -40], [   8,  -16,  -40],
    [  -8,  -16,  -40], [ -36,  -12,  -40], [   0,    0,   76],
    [   0,    0,   90], [ -80,   -6,  -40], [ -80,    6,  -40],
    [ -88,    0,  -40], [  80,    6,  -40], [  88,    0,  -40],
    [  80,   -6,  -40],
  ];
  const EDGES = [
    [ 0, 1, 0,11], [ 0, 4, 4,12], [ 1, 3, 3,10], [ 3, 8, 7,10], [ 4, 7, 8,12],
    [ 6, 7, 8, 9], [ 6, 9, 6, 9], [ 5, 9, 5, 9], [ 5, 8, 7, 9], [ 2, 5, 1, 5],
    [ 2, 6, 2, 6], [ 3, 5, 3, 7], [ 4, 6, 4, 8], [ 1, 2, 0, 1], [ 0, 2, 0, 2],
    [ 8,10, 9,10], [10,11, 9,11], [ 7,11, 9,12], [ 1,10,10,11], [ 0,11,11,12],
    [ 1, 5, 1, 3], [ 0, 6, 2, 4], [12,13, 9, 9], [18,19, 9, 9], [14,15, 9, 9],
    [16,17, 9, 9], [15,16, 9, 9], [14,17, 9, 9], [13,18, 9, 9], [12,19, 9, 9],
    [ 2, 9, 5, 6], [22,24, 9, 9], [23,24, 9, 9], [22,23, 9, 9], [25,26, 9, 9],
    [26,27, 9, 9], [25,27, 9, 9],
  ];
  const FACES = [
    [   0,  62,  31], [ -18,  55,  16], [  18,  55,  16], [ -16,  52,  14], [  16,  52,  14],
    [ -14,  47,   0], [  14,  47,   0], [ -61, 102,   0], [  61, 102,   0], [   0,   0, -80],
    [  -7, -42,   9], [   0, -30,   6], [   7, -42,   9],
  ];

  /* ---------- palettes (hue + saturation) ----------
     Each palette has TWO saturation modes: a softer one for current style,
     a vivid one for proposed (matching the Effulgence reference frames). */
  const PALETTES = {
    phosphor: {
      // hue per layer
      bg:     { h: 220, s: { current: 30, proposed: 40 } },
      planet: { h: 195, s: { current: 70, proposed: 95 } },
      dust:   { h: 200, s: { current: 60, proposed: 75 } },
      hull:   { h: 110, s: { current: 70, proposed: 95 } },
      frame:  { h: 195, s: { current: 70, proposed: 90 } },
      dash:   { h:  38, s: { current: 80, proposed: 95 } },   // target zone (warm)
      status: { h: 195, s: { current: 70, proposed: 95 } },   // ship-status zone (cool)
      planetAcc: { h: 28, s: { proposed: 95 } },
      hullAcc:   { h: 320, s: { proposed: 95 } },
    },
    amber: {
      bg:     { h: 32,  s: { current: 35, proposed: 50 } },
      planet: { h: 28,  s: { current: 75, proposed: 95 } },
      dust:   { h: 50,  s: { current: 65, proposed: 80 } },
      hull:   { h: 38,  s: { current: 75, proposed: 95 } },
      frame:  { h: 38,  s: { current: 75, proposed: 90 } },
      dash:   { h: 38,  s: { current: 80, proposed: 95 } },
      status: { h: 38,  s: { current: 75, proposed: 95 } },   // monochrome theme: same amber
      planetAcc: { h: 12,  s: { proposed: 95 } },
      hullAcc:   { h: 195, s: { proposed: 95 } },
    },
  };

  /* ---------- glyph palettes per layer (proposed mode only) ----------
     Current mode falls back to the brightness ramp. */
  const RAMP = " .·:-=+*#%@█";

  const G = {
    // Background atmosphere — sparse low-bright field tiled across the
    // whole screen. Theme-flavored: "g+kg" simulates molecules/atmosphere.
    bg: ['g','+','*','.', ':','\'',',','&','%','~','·',';',':',':','o','`'],
    // Stars at world scale — use small twinkly chars.
    star: ['·','*','+',':',"'", '·', '·'],
    // Dust streaks — small specks only, no slashes. Streak motion reads
    // from cells-in-a-row + frame-to-frame movement, not from glyph slope.
    dust: ['·','·','·','·',"'",',',':',';','`','°','*','·'],
    // Planet body — varied texture letters/digits for surface.
    planetBody: ['o','O','0','D','c','d','b','B',':',';',',','.', "'", "·",'*','%','&','@','#','+'],
    // Planet limb/edge curve indicators — slightly more "shape" chars.
    planetEdge: ['(',')','/','\\','_','-','~','c','D'],
    // Hull edge characters — bracket-and-equals vocabulary like Effulgence
    // ships (`<#>=====`, `(((/jt\)))`, `<X> )(`).
    hullSet: ['<','>','|','=','─','/','\\','*','+','(',')','[',']','#'],
    // Occasional letter "panel labels" sprinkled on the hull.
    hullLabels: ['M','C','X','S','K','A','J','o','a','#','=','*'],
    // Cockpit frame — box-drawing.
    frameH: ['─','═'],
    frameV: ['│','║'],
    frameDiag: ['╲','╱','\\','/'],
    frameCorner: ['┌','┐','└','┘','+'],
    // Dashboard frame elements — `+=====+` style, classic.
    dashFrame: ['─','═','+','|'],
    // Crosshair — boxy cross + corner brackets.
    crossH: '─',
    crossV: '│',
    crossCornerTL: '┌', crossCornerTR: '┐',
    crossCornerBL: '└', crossCornerBR: '┘',
    // Scanner ellipse — fine curves; slope-aware pickers below.
    // Gauges — block fills.
    blockFill: ['█','▓','▒','░'],
  };

  const state = {
    glow: 0.75,
    worldCell: 14,
    instCell: 7,
    speed: 1.0,
    preset: 'phosphor',
    t: 0,
  };

  /* ---------- math ---------- */
  function rotY(p, a) { const c=Math.cos(a),s=Math.sin(a); return [c*p[0]+s*p[2], p[1], -s*p[0]+c*p[2]]; }
  function rotX(p, a) { const c=Math.cos(a),s=Math.sin(a); return [p[0], c*p[1]-s*p[2], s*p[1]+c*p[2]]; }
  function rotZ(p, a) { const c=Math.cos(a),s=Math.sin(a); return [c*p[0]-s*p[1], s*p[0]+c*p[1], p[2]]; }
  function project(p, w, h, fov, camZ, screenY) {
    const z = camZ - p[2];
    if (z < 0.05) return null;
    return [(p[0] * fov) / z + w / 2, (-p[1] * fov) / z + screenY, z];
  }

  /* ---------- deterministic position hash for stable random per cell ---------- */
  function pHash(x, y, salt) {
    let h = (x | 0) * 73856093 ^ (y | 0) * 19349663 ^ (salt | 0) * 83492791;
    h = (h ^ (h >> 13)) * 1274126177;
    h = h ^ (h >> 16);
    return (h >>> 0) / 0x100000000;     // 0..1
  }
  function pPick(x, y, salt, arr) {
    return arr[Math.floor(pHash(x, y, salt) * arr.length)];
  }

  /* ---------- glyph helpers ---------- */
  function slopeChar(dx, dy) {
    const a = Math.atan2(dy, dx);
    const am = a < 0 ? a + Math.PI : a;
    if (am < Math.PI/8 || am > 7*Math.PI/8) return G.frameH[0];
    if (am > 3*Math.PI/8 && am < 5*Math.PI/8) return G.frameV[0];
    if (am >= Math.PI/8 && am <= 3*Math.PI/8) return '\\';
    return '/';
  }
  // Like slopeChar but picks from a richer set with positional variation.
  function slopeCharVaried(dx, dy, gx, gy, salt) {
    const a = Math.atan2(dy, dx);
    const am = a < 0 ? a + Math.PI : a;
    let kind;
    if (am < Math.PI/8 || am > 7*Math.PI/8) kind = 'H';
    else if (am > 3*Math.PI/8 && am < 5*Math.PI/8) kind = 'V';
    else if (am >= Math.PI/8 && am <= 3*Math.PI/8) kind = 'D';
    else kind = 'A';
    const r = pHash(gx, gy, salt);
    if (kind === 'H') return r < 0.7 ? '─' : (r < 0.9 ? '═' : '-');
    if (kind === 'V') return r < 0.7 ? '│' : (r < 0.9 ? '║' : '|');
    if (kind === 'D') return r < 0.7 ? '\\' : (r < 0.9 ? '╲' : '`');
    return r < 0.7 ? '/' : (r < 0.9 ? '╱' : '\'');
  }
  function blockChar(v) {
    if (v >= 0.85) return '█';
    if (v >= 0.6)  return '▓';
    if (v >= 0.35) return '▒';
    return '░';
  }

  /* ---------- starfield (background, twinkly) ---------- */
  const starList = [];
  for (let i = 0; i < 240; i++) {
    starList.push({
      x: Math.random(), y: Math.random() * 0.78,
      m: Math.random() * 0.6 + 0.2,
      p: Math.random() * Math.PI * 2,
    });
  }
  function drawStars() {
    sctx.fillStyle = '#02030a';
    sctx.fillRect(0, 0, innerWidth, innerHeight);
    sctx.font = '12px ui-monospace, monospace';
    sctx.textBaseline = 'middle';
    sctx.textAlign = 'center';
    for (const s of starList) {
      const tw = 0.6 + 0.4 * Math.sin(state.t * 1.5 + s.p);
      const a = s.m * tw;
      sctx.fillStyle = `rgba(200, 230, 255, ${a})`;
      const ch = s.m > 0.55 ? '*' : s.m > 0.4 ? '+' : '·';
      sctx.fillText(ch, s.x * innerWidth, s.y * innerHeight);
    }
  }

  /* ---------- stardust (foreground particles streaking past) ---------- */
  const dust = [];
  for (let i = 0; i < 60; i++) {
    dust.push({
      x: (Math.random() - 0.5) * 4,
      y: (Math.random() - 0.5) * 4,
      z: -Math.random() * 6,
    });
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.max(1, Math.floor(innerWidth  * dpr));
    const h = Math.max(1, Math.floor(innerHeight * dpr));
    for (const c of [stage, stars]) {
      c.width = w; c.height = h;
      c.style.width  = Math.max(1, innerWidth)  + 'px';
      c.style.height = Math.max(1, innerHeight) + 'px';
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawStars();
  }
  addEventListener('resize', resize);
  resize();

  /* ---------- input ---------- */
  const wire = (id, fn, fmt) => {
    const el = document.getElementById(id);
    const val = document.getElementById(id + 'Val');
    el.addEventListener('input', () => {
      fn(+el.value);
      val.textContent = fmt ? fmt(+el.value) : el.value;
    });
  };
  wire('glow',      v => state.glow = v / 100);
  wire('worldCell', v => state.worldCell = v);
  wire('instCell',  v => state.instCell = v);
  wire('speed',     v => state.speed = v / 100, v => (v/100).toFixed(1));

  document.querySelectorAll('[data-preset]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-preset]').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      state.preset = btn.dataset.preset;
    });
  });

  /* ---------- offscreen color buckets for clean per-color bloom ---------- */
  const buckets = {};
  function getBucket(name) {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.max(1, stage.width || Math.floor(innerWidth * dpr));
    const h = Math.max(1, stage.height || Math.floor(innerHeight * dpr));
    if (!buckets[name] || buckets[name].canvas.width !== w || buckets[name].canvas.height !== h) {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const cx = c.getContext('2d');
      cx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buckets[name] = { canvas: c, ctx: cx };
    }
    return buckets[name];
  }

  /* ---------- a "layer" carries its own cell size, grid, and bloom mul ---------- */
  function makeLayer(name, kind, hueRef, cell, W, H, bloomMul = 1) {
    const cols = Math.ceil(W / cell);
    const rows = Math.ceil(H / cell);
    return {
      name, kind, hueRef, cell, cols, rows,
      intensity: new Float32Array(cols * rows),
      chars: new Array(cols * rows).fill(null),
      bloomMul,
    };
  }

  function setCell(layer, gx, gy, v, ch) {
    if (gx < 0 || gx >= layer.cols || gy < 0 || gy >= layer.rows) return;
    const idx = gy * layer.cols + gx;
    if (v > layer.intensity[idx]) {
      layer.intensity[idx] = v;
      layer.chars[idx] = ch || null;
    }
  }
  function plotLine(layer, x1, y1, x2, y2, brightness, ch) {
    const dx = x2 - x1, dy = y2 - y1;
    const steps = Math.max(2, Math.ceil(Math.hypot(dx, dy) * 1.4));
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const gx = Math.round(x1 + dx*t), gy = Math.round(y1 + dy*t);
      const cellCh = (typeof ch === 'function') ? ch(gx, gy, dx, dy) : ch;
      setCell(layer, gx, gy, brightness, cellCh);
    }
  }
  function plotPoint(layer, gx, gy, brightness, ch) {
    setCell(layer, gx, gy, brightness, ch);
  }

  /* ---------- main render loop ---------- */
  let last = performance.now();

  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    state.t += dt * state.speed;

    drawStars();

    const W = innerWidth, H = innerHeight;
    const PAL = PALETTES[state.preset];
    const sat = (key) => PAL[key].s.proposed ?? PAL[key].s.current ?? 80;

    const wCell = state.worldCell;
    const iCell = state.instCell;

    ctx.fillStyle = 'rgba(2, 3, 10, 1)';
    ctx.fillRect(0, 0, W, H);

    /* ============================================================
       LAYER ALLOCATION
       ============================================================ */
    // bloomMul boosts the bloom intensity for "atmospheric" objects —
    // the planet glows more than a wireframe ship would.
    const lBg        = makeLayer('bg',        'world', 'bg',        wCell, W, H);
    const lPlanet    = makeLayer('planet',    'world', 'planet',    wCell, W, H, 1.6);
    const lPlanetAcc = makeLayer('planetAcc', 'world', 'planetAcc', wCell, W, H, 1.6);
    const lDust      = makeLayer('dust',      'world', 'dust',      wCell, W, H);
    // Hull renders at instrument-scale cells in both modes — wireframes
    // need fine cells to read; the chunky proposed-mode wCell makes the
    // Cobra blocky and unrecognisable.
    const lHull      = makeLayer('hull',      'world', 'hull',      iCell, W, H);
    const lHullAcc   = makeLayer('hullAcc',   'world', 'hullAcc',   iCell, W, H);
    const lFrame     = makeLayer('frame',     'inst',  'frame',     iCell, W, H);
    const lDash      = makeLayer('dash',      'inst',  'dash',      iCell, W, H);
    const lStatus    = makeLayer('status',    'inst',  'status',    iCell, W, H);

    /* ============================================================
       1. BACKGROUND ATMOSPHERE — DISABLED for space scenes.

       Effulgence's dense letter backgrounds belong to *environments*
       — Sea of Electrolysis, Highway, Fiber Forest — places the
       player is physically inside. Open space is the opposite: vast
       and empty, with stars and dust as the only texture. Filling
       it with `g+&` glyphs reads as "you're trapped in a text wall,"
       not "you're in space."

       This layer stays in the code for future environment scenes
       (station interiors, planetary surfaces, asteroid fields)
       where a textured background is the right call. For the
       cockpit-in-space mockup, leave it empty.
       ============================================================ */
    // (intentionally blank in this scene)

    /* ============================================================
       2. PLANET — filled disc with surface texture (proposed) or
          limb arc (current). Disc center is below-left, sphere
          larger than viewport so we see the upper-right quadrant.
       ============================================================ */
    {
      const cx = W * 0.18, cy = H * 0.95;
      const radius = Math.min(W, H) * 0.5;
      const drift = state.t * 0.01;

      // Filled disc with sphere-projected surface coordinates so the
      // planet actually rotates: surface features advance in longitude
      // over time, compress near the limb, and lighting stays fixed in
      // screen space (light source doesn't move with the planet).
      //
      //   screen point (dx, dy) on disc, normalised to (nx, ny).
      //   latitude  = asin(ny)
      //   longitude_visible = asin(nx / cos(latitude))   [near hemisphere]
      //   longitude_surface = longitude_visible + driftLng(t)
      //
      // The drift adds rotation about the spin axis (vertical screen
      // axis ≈ planet's pole here). Both noise and glyph lookups use
      // (latitude, longitude_surface) so features move with the spin.
      const cell = lPlanet.cell;
      const cxc = cx / cell, cyc = cy / cell, rc = radius / cell;
      const driftLng = state.t * 0.18;            // ~35 sec per full rotation
      for (let gy = Math.floor(cyc - rc - 1); gy <= Math.ceil(cyc + 1); gy++) {
        for (let gx = Math.floor(cxc - rc - 1); gx <= Math.ceil(cxc + rc + 1); gx++) {
          const dx = gx - cxc, dy = gy - cyc;
          const d = Math.hypot(dx, dy);
          if (d > rc) continue;
          // Upper hemisphere only (cy is below screen, so dy < 0 = above).
          if (dy > 0) continue;
          const nx = dx / rc, ny = dy / rc;
          // Lighting — fixed in screen space (light doesn't rotate).
          const light = 0.6 * nx - 0.8 * ny;
          // Sphere projection.
          const lat = Math.asin(Math.max(-1, Math.min(1, ny)));
          const cosLat = Math.cos(lat);
          if (cosLat < 0.04) continue;             // skip the poles
          const lonArg = nx / cosLat;
          if (Math.abs(lonArg) > 1) continue;      // outside visible hemisphere
          const lonVis = Math.asin(lonArg);
          const lon = lonVis + driftLng;           // surface longitude — rotates
          // Continuous-globe noise: continents move with longitude.
          const noise = (Math.sin(lon * 4.5) + Math.cos(lat * 6)
                       + Math.sin((lon - lat) * 3.5)) / 3;
          const isAccent = noise > 0.18;
          const edge = Math.min(1, (rc - d) / 1.2);
          const v = Math.max(0, Math.min(1,
            0.45 + light * 0.32 + noise * 0.14)) * edge;
          if (v < 0.18) continue;
          // Glyph keyed to surface coords — character at a screen cell
          // changes as the surface rotates beneath it.
          const hashLon = Math.round(lon * 6);
          const hashLat = Math.round(lat * 9);
          const ch = pPick(hashLon, hashLat, 13, G.planetBody);
          setCell(isAccent ? lPlanetAcc : lPlanet, gx, gy, v, ch);
        }
      }
      // Bright limb edge — silhouette doesn't rotate; only the inside does.
      // Tiny apparent drift kept for camera-roll feel.
      for (let a = -Math.PI * 0.85; a <= -Math.PI * 0.15; a += 0.006) {
        const x = cx + Math.cos(a + drift) * radius;
        const y = cy + Math.sin(a + drift) * radius;
        const gx = Math.round(x / lPlanet.cell), gy = Math.round(y / lPlanet.cell);
        const tx = -Math.sin(a + drift), ty = Math.cos(a + drift);
        const ch = slopeCharVaried(tx, ty, gx, gy, 21);
        setCell(lPlanet, gx, gy, 0.9, ch);
      }
    }

    /* ============================================================
       3. STARDUST — streaking foreground particles
       ============================================================ */
    {
      const fov = 320;
      const camZ = 1.0;
      const dustSpeed = 1.4;
      for (const d of dust) {
        d.z += dustSpeed * dt * state.speed;
        if (d.z > camZ - 0.1) {
          d.x = (Math.random() - 0.5) * 4;
          d.y = (Math.random() - 0.5) * 4;
          d.z = -Math.random() * 6 - 0.5;
        }
        const sp  = project([d.x, d.y, d.z],         W, H, fov, camZ, H * 0.42);
        const sp2 = project([d.x, d.y, d.z - 0.06],  W, H, fov, camZ, H * 0.42);
        if (!sp || !sp2) continue;
        const close = 1 - Math.max(0, Math.min(1, (camZ - d.z) / 6));
        const x1 = sp[0]/lDust.cell, y1 = sp[1]/lDust.cell;
        const x2 = sp2[0]/lDust.cell, y2 = sp2[1]/lDust.cell;
        // Small specks only — dust reads as motion via cells-in-a-row +
        // per-frame movement, not via slash characters.
        const ch = (gx, gy) => pPick(gx, gy, 31, G.dust);
        plotLine(lDust, x1, y1, x2, y2, 0.35 + close * 0.6, ch);
      }
    }

    /* ============================================================
       4. THE COBRA — hovers in the upper-right quadrant of the canopy
       as a "showroom" target. Continuous yaw with gentle pitch / roll
       so we see every side of the model without it tumbling chaotically.
       Tiny x/y bob keeps it from feeling statue-still. The hull edges
       use a per-position varied palette of bracket-and-equals glyphs.
       ============================================================ */
    {
      const orbitT = state.t * 0.25;
      // Hover position — upper-right of view, close enough (depth ~1.4)
      // that the ~256-unit Cobra reads at ~73 px on screen.
      const shipPos = [
        0.65 + Math.sin(orbitT * 0.4) * 0.04,
        0.45 + Math.sin(orbitT * 0.6) * 0.04,
        -0.4,
      ];
      // Showroom rotation: full yaw turn ~25 s; gentle pitch + roll
      // oscillation so the ship doesn't tumble past visibility.
      const yaw   = orbitT * 1.0;
      const pitch = Math.sin(orbitT * 0.4) * 0.4;
      const roll  = Math.sin(orbitT * 0.3) * 0.15;
      const SCALE = 0.0025;

      const tv = VERTICES.map(v => {
        let p = [v[0] * SCALE, v[1] * SCALE, v[2] * SCALE];
        p = rotZ(p, roll); p = rotX(p, pitch); p = rotY(p, yaw);
        return [p[0] + shipPos[0], p[1] + shipPos[1], p[2] + shipPos[2]];
      });
      const camZ = 1.0;
      const fov = 320;
      const faceVis = FACES.map(f => {
        let n = [f[0], f[1], f[2]];
        n = rotZ(n, roll); n = rotX(n, pitch); n = rotY(n, yaw);
        return n[2] > 0;
      });
      const pv = tv.map(p => project(p, W, H, fov, camZ, H * 0.42));

      for (let ei = 0; ei < EDGES.length; ei++) {
        const ed = EDGES[ei];
        const [v1, v2, f1, f2] = ed;
        if (!faceVis[f1] && !faceVis[f2]) continue;
        const a = pv[v1], b = pv[v2];
        if (!a || !b) continue;
        const x1 = a[0]/lHull.cell, y1 = a[1]/lHull.cell, x2 = b[0]/lHull.cell, y2 = b[1]/lHull.cell;
        const avgZ = (a[2] + b[2]) * 0.5;
        const close = Math.max(0.4, Math.min(1, 2 / avgZ));
        // No per-cell glyph picker — let the brightness ramp pick (gives
        // the clean uniform-bright wireframe look). The bracket-and-equals
        // hull palette read as noise on a thin wireframe; clean line glyphs
        // serve the geometry better.
        const layer = (ei % 7 === 3) ? lHullAcc : lHull;
        plotLine(layer, x1, y1, x2, y2, close * 0.85, null);
      }
    }

    /* ============================================================
       5. CROSSHAIR — instrument scale.
       Current style: simple + with gap.
       Proposed style: concentric reticle (inner + outer rings,
       cardinal ticks, faint center dot) — modern targeting feel.
       ============================================================ */
    {
      const cell = lFrame.cell;
      const ccx = (W / 2) / cell;
      const ccy = (H * 0.42) / cell;

      // Concentric reticle — modern targeting feel.
      plotPoint(lFrame, Math.round(ccx), Math.round(ccy), 0.55, '·');
      for (let a = 0; a < Math.PI * 2; a += Math.PI / 8) {
        const px = ccx + Math.cos(a) * 2;
        const py = ccy + Math.sin(a) * 2;
        const tx = -Math.sin(a), ty = Math.cos(a);
        plotPoint(lFrame, Math.round(px), Math.round(py), 0.85,
                  slopeCharVaried(tx, ty, Math.round(px), Math.round(py), 51));
      }
      for (let a = 0; a < Math.PI * 2; a += Math.PI / 12) {
        const px = ccx + Math.cos(a) * 4;
        const py = ccy + Math.sin(a) * 4;
        const tx = -Math.sin(a), ty = Math.cos(a);
        plotPoint(lFrame, Math.round(px), Math.round(py), 0.7,
                  slopeCharVaried(tx, ty, Math.round(px), Math.round(py), 53));
      }
      plotPoint(lFrame, Math.round(ccx + 5), Math.round(ccy),     0.95, '─');
      plotPoint(lFrame, Math.round(ccx - 5), Math.round(ccy),     0.95, '─');
      plotPoint(lFrame, Math.round(ccx),     Math.round(ccy + 5), 0.95, '│');
      plotPoint(lFrame, Math.round(ccx),     Math.round(ccy - 5), 0.95, '│');
    }

    /* ============================================================
       6. COCKPIT FRAME — instrument scale, trapezoidal canopy.
       ============================================================ */
    {
      const cell = lFrame.cell;
      const inset = 12;
      const dashTop = H * 0.72;
      const tlx = inset, tly = inset;
      const trx = W - inset, try_ = inset;
      const blx = inset + W * 0.10, bly = dashTop;
      const brx = W - inset - W * 0.10, bry = dashTop;

      plotLine(lFrame, tlx/cell, tly/cell, trx/cell, try_/cell, 0.7,
               (gx, gy) => pPick(gx, gy, 91, ['─','═','─','─']));
      plotLine(lFrame, tlx/cell, tly/cell, blx/cell, bly/cell, 0.7,
               (gx, gy, dx, dy) => slopeCharVaried(dx, dy, gx, gy, 92));
      plotLine(lFrame, trx/cell, try_/cell, brx/cell, bry/cell, 0.7,
               (gx, gy, dx, dy) => slopeCharVaried(dx, dy, gx, gy, 93));

      plotPoint(lFrame, Math.round(tlx/cell), Math.round(tly/cell), 0.95, '┌');
      plotPoint(lFrame, Math.round(trx/cell), Math.round(try_/cell), 0.95, '┐');
      plotPoint(lFrame, Math.round(blx/cell), Math.round(bly/cell), 0.85, '└');
      plotPoint(lFrame, Math.round(brx/cell), Math.round(bry/cell), 0.85, '┘');
    }

    /* ============================================================
       7. DASHBOARD — instrument scale, modernized.
       Layout (left-to-right):
          ┌──────────────┐  ┌────────────────┐  ┌──────────────┐
          │ TARGET DISK  │  │  SCANNER + sweep│  │ STATUS DISK  │
          │ amber zone   │  │  amber zone     │  │ cyan zone    │
          └──────────────┘  └────────────────┘  └──────────────┘
       Target disk: rotating mini-target at center, range arc, tick frame.
       Scanner: existing ellipse + radar sweep + Cobra blip.
       Status disk: three concentric arcs for hull / shields / fuel.
       Multi-color zones make the dashboard read at a glance.
       ============================================================ */
    {
      const cell = lDash.cell;
      // Compact dashboard — ~20% of screen height.
      const dashTop = H * 0.80;
      const dashBottom = H - 8;
      const dashH = dashBottom - dashTop;

      // Top dashboard edge — spans full width.
      plotLine(lDash,
        (W * 0.05)/cell, dashTop/cell,
        (W - W * 0.05)/cell, dashTop/cell, 0.85,
        (gx, gy) => pPick(gx, gy, 101, ['─','═','=','─']));

      const rcx = W * 0.5;
      const rcy = dashTop + dashH * 0.50;
      const rw = W * 0.07;
      const rh = dashH * 0.40;
      const diskR = dashH * 0.42;

      /* ---- center scanner ---- */
      // Outer ellipse
      let prev = null;
      for (let a = 0; a <= Math.PI * 2 + 0.05; a += 0.05) {
        const x = rcx + Math.cos(a) * rw;
        const y = rcy + Math.sin(a) * rh;
        if (prev) {
          plotLine(lDash, prev[0]/cell, prev[1]/cell, x/cell, y/cell, 0.85,
                   (gx, gy, dx, dy) => slopeCharVaried(dx, dy, gx, gy, 111));
        }
        prev = [x, y];
      }
      prev = null;
      for (let a = 0; a <= Math.PI * 2 + 0.05; a += 0.06) {
        const x = rcx + Math.cos(a) * rw * 0.55;
        const y = rcy + Math.sin(a) * rh * 0.55;
        if (prev) {
          plotLine(lDash, prev[0]/cell, prev[1]/cell, x/cell, y/cell, 0.55,
                   (gx, gy, dx, dy) => slopeCharVaried(dx, dy, gx, gy, 113));
        }
        prev = [x, y];
      }
      plotLine(lDash, (rcx - rw)/cell, rcy/cell, (rcx + rw)/cell, rcy/cell, 0.5, '─');

      /* ---- radar sweep — leading line + perimeter trail ---- */
      const sweepAngle = state.t * 0.55;       // ~11 sec per rotation
      {
        const sweepEX = rcx + Math.cos(sweepAngle) * rw;
        const sweepEY = rcy + Math.sin(sweepAngle) * rh;
        plotLine(lDash, rcx/cell, rcy/cell, sweepEX/cell, sweepEY/cell, 0.95,
                 (gx, gy, dx, dy) => slopeCharVaried(dx, dy, gx, gy, 119));
        const trailSpan = 0.55, trailSteps = 18;
        let prevTrail = null;
        for (let i = trailSteps; i > 0; i--) {
          const t = i / trailSteps;
          const a = sweepAngle - trailSpan * t;
          const x = rcx + Math.cos(a) * rw;
          const y = rcy + Math.sin(a) * rh;
          if (prevTrail) {
            const v = 0.7 * (1 - t);
            if (v > 0.08) {
              plotLine(lDash, prevTrail[0]/cell, prevTrail[1]/cell, x/cell, y/cell, v,
                       (gx, gy, dx, dy) => slopeCharVaried(dx, dy, gx, gy, 121));
            }
          }
          prevTrail = [x, y];
        }
      }

      /* ---- radar blip (the Cobra) — synced to the hover position
              so the scanner shows the same target the player sees ---- */
      const orbitT = state.t * 0.25;
      const shipScannerX = 0.65 + Math.sin(orbitT * 0.4) * 0.04;
      const shipScannerY = 0.45 + Math.sin(orbitT * 0.6) * 0.04;
      const shipScannerZ = -0.4;
      const blipX = rcx + shipScannerX * rw * 0.75;
      const blipY = rcy + (shipScannerZ + 2) * rh * 0.4;
      const stalkLen = -shipScannerY * dashH * 0.45;
      plotLine(lDash, blipX/cell, blipY/cell, blipX/cell, (blipY + stalkLen)/cell, 0.95, '│');
      plotPoint(lDash, Math.round(blipX/cell), Math.round((blipY + stalkLen)/cell), 1.0, '◆');
      plotPoint(lDash, Math.round(blipX/cell)+1, Math.round((blipY + stalkLen)/cell), 1.0, '◆');
      plotPoint(lDash, Math.round(blipX/cell), Math.round((blipY + stalkLen)/cell)+1, 1.0, '◆');

      /* ---- left holo-disk: target zone (amber) ---- */
      const tdcx = rcx - rw - W * 0.06 - diskR;
      const tdcy = rcy;
      // Outer ring
      prev = null;
      for (let a = 0; a <= Math.PI * 2 + 0.05; a += 0.04) {
        const x = tdcx + Math.cos(a) * diskR;
        const y = tdcy + Math.sin(a) * diskR;
        if (prev) {
          plotLine(lDash, prev[0]/cell, prev[1]/cell, x/cell, y/cell, 0.8,
                   (gx, gy, dx, dy) => slopeCharVaried(dx, dy, gx, gy, 131));
        }
        prev = [x, y];
      }
      // Cross axes
      plotLine(lDash, (tdcx - diskR)/cell, tdcy/cell, (tdcx + diskR)/cell, tdcy/cell, 0.45, '─');
      plotLine(lDash, tdcx/cell, (tdcy - diskR)/cell, tdcx/cell, (tdcy + diskR)/cell, 0.45, '│');
      // Cardinal ticks just outside the ring
      for (const [dx, dy, ch] of [[1.15,0,'─'],[-1.15,0,'─'],[0,1.15,'│'],[0,-1.15,'│']]) {
        plotPoint(lDash,
          Math.round((tdcx + dx * diskR) / cell),
          Math.round((tdcy + dy * diskR) / cell), 0.95, ch);
      }
      // Empty target reticle — small inner ring + center "+". When v0.2
      // lands targeting, this becomes the actual target wireframe + range.
      for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
        const px = tdcx/cell + Math.cos(a) * 1.5;
        const py = tdcy/cell + Math.sin(a) * 1.5;
        plotPoint(lDash, Math.round(px), Math.round(py), 0.55,
                  slopeCharVaried(-Math.sin(a), Math.cos(a), Math.round(px), Math.round(py), 137));
      }
      plotPoint(lDash, Math.round(tdcx/cell), Math.round(tdcy/cell), 0.65, '+');

      /* ---- right holo-disk: status zone (cyan) ----
         Three concentric arcs: outer = hull, middle = shields, inner = fuel.
         Each arc starts at the top (-π/2) and extends clockwise by fill * 2π. */
      const sdcx = rcx + rw + W * 0.06 + diskR;
      const sdcy = rcy;
      // Outer ring (frame of the disk)
      prev = null;
      for (let a = 0; a <= Math.PI * 2 + 0.05; a += 0.04) {
        const x = sdcx + Math.cos(a) * diskR;
        const y = sdcy + Math.sin(a) * diskR;
        if (prev) {
          plotLine(lStatus, prev[0]/cell, prev[1]/cell, x/cell, y/cell, 0.8,
                   (gx, gy, dx, dy) => slopeCharVaried(dx, dy, gx, gy, 141));
        }
        prev = [x, y];
      }
      // Cardinal ticks
      for (const [dx, dy, ch] of [[1.15,0,'─'],[-1.15,0,'─'],[0,1.15,'│'],[0,-1.15,'│']]) {
        plotPoint(lStatus,
          Math.round((sdcx + dx * diskR) / cell),
          Math.round((sdcy + dy * diskR) / cell), 0.95, ch);
      }
      // Live readings (slow oscillations + fuel slow drain).
      const hullPct   = 0.92 + Math.sin(state.t * 0.4) * 0.03;
      const shieldPct = 0.78 + Math.sin(state.t * 0.6 + 1) * 0.06;
      const fuelPct   = Math.max(0, 0.55 - state.t * 0.0006);
      // Three labeled stacked horizontal bars inside the disk — readable
      // at a glance. Replaces the concentric-arcs treatment that was hard
      // to interpret in combat.
      const sBars = [
        { label: 'HUL', val: hullPct },
        { label: 'SHD', val: shieldPct },
        { label: 'FUL', val: fuelPct },
      ];
      const sBarW = diskR * 1.2;
      const sBarH = 6;
      const sBarRowH = 14;
      const sBarLeftX = sdcx - sBarW / 2 + 18;
      const sBarTopY = sdcy - (sBars.length * sBarRowH) / 2 + 4;
      for (let i = 0; i < sBars.length; i++) {
        const b = sBars[i];
        const by = sBarTopY + i * sBarRowH;
        plotLine(lStatus, sBarLeftX/cell, by/cell, (sBarLeftX + sBarW - 18)/cell, by/cell, 0.55, '─');
        plotLine(lStatus, sBarLeftX/cell, (by + sBarH)/cell, (sBarLeftX + sBarW - 18)/cell, (by + sBarH)/cell, 0.55, '─');
        const fillW = (sBarW - 18) * Math.max(0, Math.min(1, b.val));
        plotLine(lStatus, sBarLeftX/cell, (by + sBarH/2)/cell, (sBarLeftX + fillW)/cell, (by + sBarH/2)/cell, 0.95, blockChar(b.val));
      }
      window.__sBars = sBars.map((b, i) => ({
        label: b.label, val: b.val,
        x: sBarLeftX - 10,
        y: sBarTopY + i * sBarRowH + sBarH / 2,
      }));

      // Stash disk centers + radius for HUD label placement below.
      window.__diskTgt = { cx: tdcx, cy: tdcy, r: diskR };
      window.__diskSt  = { cx: sdcx, cy: sdcy, r: diskR };

      /* ---- mini bar strip (SPD / ENG / HEAT) below the scanner ----
         Speed = throttle position; energy = capacitor charge; heat =
         laser temperature. All animate with their own slow oscillation
         so the row reads as live equipment, not a static decal. */
      const barY = rcy + rh + 4;
      const barW = 78;
      const barH = 8;
      const barGap = 14;
      const totalBarW = 3 * barW + 2 * barGap;
      const barLeftX = rcx - totalBarW / 2;
      const speedPct  = 0.62 + Math.sin(state.t * 0.6) * 0.05;
      const energyPct = 0.85 + Math.sin(state.t * 0.4) * 0.08;
      const heatPct   = 0.30 + Math.sin(state.t * 1.3) * 0.04;
      const miniBars = [
        { label: 'SPD',  val: speedPct,  x: barLeftX },
        { label: 'ENG',  val: energyPct, x: barLeftX + barW + barGap },
        { label: 'HEAT', val: heatPct,   x: barLeftX + 2 * (barW + barGap) },
      ];
      for (const b of miniBars) {
        // Top + bottom rules of the bar frame.
        plotLine(lDash, b.x/cell, barY/cell, (b.x + barW)/cell, barY/cell, 0.55, '─');
        plotLine(lDash, b.x/cell, (barY + barH)/cell,
                 (b.x + barW)/cell, (barY + barH)/cell, 0.55, '─');
        // Fill row (middle line).
        const fillW = barW * Math.max(0, Math.min(1, b.val));
        const fillCh = blockChar(b.val);
        plotLine(lDash, b.x/cell, (barY + barH/2)/cell,
                 (b.x + fillW)/cell, (barY + barH/2)/cell, 0.95, fillCh);
      }
      window.__bars = miniBars.map(b => ({
        label: b.label, x: b.x, w: barW,
        labelY: barY + barH + 7,
        valueY: barY + barH + 18,
        val: b.val,
      }));
    }

    /* ============================================================
       COMPOSITOR — render world layers first, then instrument
       layers on top. Each scale has its own glyph rendering pass.
       ============================================================ */
    function renderGroup(layers, cell) {
      if (!layers.length) return;
      const cols = layers[0].cols, rows = layers[0].rows;
      const fontSize = Math.max(6, cell - 1);
      const fontDecl = `${fontSize}px ui-monospace, "JetBrains Mono", "Fira Code", monospace`;
      for (const L of layers) {
        const b = getBucket(L.name);
        b.ctx.clearRect(0, 0, W, H);
        b.ctx.font = fontDecl;
        b.ctx.textBaseline = 'middle';
        b.ctx.textAlign = 'center';
      }
      ctx.font = fontDecl;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';

      for (let gy = 0; gy < rows; gy++) {
        for (let gx = 0; gx < cols; gx++) {
          const idx = gy * cols + gx;
          let bestV = 0, bestL = null;
          for (const L of layers) {
            if (L.intensity[idx] > bestV) { bestV = L.intensity[idx]; bestL = L; }
          }
          if (bestV < 0.06 || !bestL) continue;
          const ch = bestL.chars[idx] || RAMP[Math.min(RAMP.length - 1, Math.floor(bestV * RAMP.length))];
          const x = gx*cell + cell/2, y = gy*cell + cell/2;
          const hue = PAL[bestL.hueRef].h;
          const s = sat(bestL.hueRef);
          const light = 50 + bestV * 38;
          ctx.fillStyle = `hsl(${hue}, ${s}%, ${light}%)`;
          ctx.fillText(ch, x, y);
          const b = getBucket(bestL.name);
          b.ctx.fillStyle = `hsl(${hue}, ${Math.min(100, s+5)}%, ${Math.min(95, light + 18)}%)`;
          b.ctx.fillText(ch, x, y);
        }
      }
      // Bloom — per-layer intensity via bloomMul so atmospheric objects
      // (the planet) glow more than wireframe objects (the ship).
      if (state.glow > 0.01) {
        ctx.globalCompositeOperation = 'lighter';
        const passes = [
          { blur: 2,  alpha: 0.65 },
          { blur: 6,  alpha: 0.55 },
          { blur: 16, alpha: 0.45 },
          { blur: 36, alpha: 0.30 },
        ];
        for (const L of layers) {
          const b = getBucket(L.name);
          if (!b.canvas.width || !b.canvas.height) continue;
          const mul = L.bloomMul || 1;
          for (const p of passes) {
            ctx.filter = `blur(${p.blur}px)`;
            ctx.globalAlpha = Math.min(1, p.alpha * state.glow * mul);
            ctx.drawImage(b.canvas, 0, 0, W, H);
          }
        }
        ctx.filter = 'none';
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
      }
    }

    // Cockpit mask — black-out everything outside the canopy trapezoid
    // BEFORE drawing instruments. Otherwise gauges and frame edges sit
    // on top of bright planet/hull content and become unreadable.
    function drawCockpitMask() {
      const inset = 12;
      const dashTop = H * 0.72;
      ctx.save();
      ctx.fillStyle = 'rgba(2, 3, 10, 1)';
      ctx.beginPath();
      // Outer rectangle = whole screen
      ctx.rect(0, 0, W, H);
      // Inner cutout = canopy trapezoid (clockwise so even-odd cuts it out)
      ctx.moveTo(inset, inset);
      ctx.lineTo(W - inset, inset);
      ctx.lineTo(W - inset - W * 0.10, dashTop);
      ctx.lineTo(inset + W * 0.10, dashTop);
      ctx.closePath();
      ctx.fill('evenodd');
      ctx.restore();
    }

    // World background group at chunky cells (back to front: bg, planet, planetAcc, dust).
    renderGroup([lBg, lPlanet, lPlanetAcc, lDust], wCell);
    // Hull group at fine cells — wireframes need the precision. Still part
    // of the "world" pass so it renders before the cockpit mask, i.e. the
    // ship is visible only through the canopy, not on the dashboard.
    renderGroup([lHull, lHullAcc], iCell);
    // Mask the cockpit body so instruments don't fight the world for legibility.
    drawCockpitMask();
    // Instrument group renders on top of the mask. Status disk has its
    // own cyan layer so the multi-zone color split doesn't muddy via
    // the brightest-wins compositor.
    renderGroup([lFrame, lDash, lStatus], iCell);

    /* ---------- HUD text labels (drawn directly with bloom) ---------- */
    function glowText(text, x, y, hueRef, size, weight = '600') {
      const hue = PAL[hueRef].h;
      const s = sat(hueRef);
      ctx.font = `${weight} ${size}px ui-monospace, "JetBrains Mono", monospace`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.shadowColor = `hsl(${hue}, ${Math.min(100, s+5)}%, 70%)`;
      ctx.shadowBlur = 12 * state.glow;
      ctx.fillStyle = `hsl(${hue}, ${s}%, 80%)`;
      ctx.fillText(text, x, y);
      ctx.shadowBlur = 0;
    }
    glowText('FRONT VIEW · LAVE', W / 2, 28, 'frame', 13);

    // Disk labels (placed below each holo-disk).
    if (window.__diskTgt) {
      glowText('NO TGT', window.__diskTgt.cx, window.__diskTgt.cy + window.__diskTgt.r + 14, 'dash',   10);
      glowText('SYS',    window.__diskSt.cx,  window.__diskSt.cy  + window.__diskSt.r  + 14, 'status', 10);
    }
    // Stacked-bar labels next to each row inside the SYSTEMS disk.
    if (window.__sBars) {
      for (const b of window.__sBars) {
        glowText(b.label, b.x - 4, b.y, 'status', 8, '500');
      }
    }
    // Mini-bar labels + values (SPD / ENG / HEAT below the scanner).
    if (window.__bars) {
      for (const b of window.__bars) {
        glowText(b.label, b.x + b.w / 2, b.labelY, 'dash', 8, '500');
        glowText(`${Math.round(b.val * 100)}%`,
                 b.x + b.w / 2, b.valueY, 'dash', 8, '400');
      }
    }
    glowText(`world ${wCell}px / inst ${iCell}px · per-layer glyphs · filled planet · vivid sat`,
      W / 2, H - 10, 'frame', 9, '400');

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
