<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APHELION — Galactic Chart</title>
<style>
  :root {
    --bg: #02030a;
    --panel: rgba(10, 16, 32, 0.78);
    --border: rgba(120, 200, 255, 0.22);
    --ink: #cfe7ff;
    --muted: #6b7a99;
    --accent: #7cf7ff;
    --warn: #ffb84a;
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    overflow: hidden;
    height: 100%;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.85) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.022) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 5;
  }

  #stage { position: fixed; inset: 0; display: block; z-index: 1; cursor: crosshair; }

  #title {
    position: fixed;
    top: 14px; left: 0; right: 0;
    z-index: 6;
    text-align: center;
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    text-shadow: 0 0 8px var(--accent);
    pointer-events: none;
  }
  #title .sub {
    margin-top: 4px;
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.25em;
    text-shadow: none;
  }

  #info {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 6;
    background: var(--panel);
    backdrop-filter: blur(12px) saturate(140%);
    -webkit-backdrop-filter: blur(12px) saturate(140%);
    border-top: 1px solid var(--border);
    padding: 14px 24px 18px;
    font-size: 11px;
    line-height: 1.5;
    /* Fixed height — never reflows. */
    height: 168px;
    box-sizing: border-box;
    /* Two rows: stats above (flexible), description below (fixed two-line
       height so single-line and two-line descriptions occupy the same
       slot). The auto-sized previous version reflowed the panel by ~18px
       between short and long descriptions.                              */
    display: grid;
    grid-template-rows: 1fr 42px;
    gap: 10px;
  }
  /* The stats row: hero (planet + name) + 4 fixed-width data cells. */
  #info .stats-row {
    display: grid;
    grid-template-columns: 320px repeat(4, minmax(140px, 1fr));
    gap: 24px;
    align-items: stretch;
    min-height: 0;
  }
  /* Hero cell: planet on the left, name + coordinates on the right. */
  #info .hero {
    display: grid;
    grid-template-columns: 76px 1fr;
    gap: 14px;
    align-items: center;
    border-right: 1px solid var(--border);
    padding-right: 20px;
    min-width: 0;
  }
  #info .planet {
    width: 72px; height: 72px;
    position: relative;
  }
  #info .planet canvas {
    width: 100%; height: 100%;
    display: block;
  }
  #info .hero-text { min-width: 0; }
  #info h2 {
    margin: 0 0 6px;
    color: var(--accent);
    font-size: 22px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-shadow: 0 0 8px var(--accent);
    /* Long names truncate with ellipsis instead of pushing the layout. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #info .hero-text .lbl {
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 1px;
  }
  #info .hero-text .v {
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    letter-spacing: 0.06em;
  }
  /* Each data cell: label on top, two stat rows below. We pair stats
     into the same cell (Economy + Government, Tech + Population, etc.)
     so we get four cells of similar visual weight, and the long values
     wrap within their cell rather than displacing anything.            */
  #info .cell {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
    overflow: hidden;
  }
  #info .cell .pair {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }
  #info .cell .lbl {
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #info .cell .v {
    color: var(--ink);
    font-size: 12px;
    line-height: 1.25;
    font-variant-numeric: tabular-nums;
    /* Allow wrapping for long values like "Mainly Agricultural", clamp
       at two lines so we can never push the cell taller than its slot. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  #info .cell .v.warn { color: var(--warn); }
  /* Description row: full-width, italic, with a subtle leading mark. */
  #info .description {
    color: var(--ink);
    font-size: 12px;
    line-height: 1.5;
    font-style: italic;
    opacity: 0.92;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    /* Hard-clamp to two lines so the row's height never changes. The
       grid-template-rows reserves a fixed 42px slot regardless of how
       much text we put here.                                            */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    /* Soft fade on the second line so a clipped tail looks intentional
       rather than truncated.                                            */
    mask-image: linear-gradient(180deg, black 70%, transparent 100%);
    -webkit-mask-image: linear-gradient(180deg, black 70%, transparent 100%);
  }

  #legend {
    position: fixed;
    /* Sits just above the bottom info strip. */
    bottom: 180px; right: 16px;
    z-index: 6;
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.6;
  }
  #legend strong { color: var(--accent); font-weight: 600; }

  #galaxy-tabs {
    position: fixed;
    top: 14px; right: 14px;
    z-index: 6;
    display: flex;
    gap: 3px;
  }
  #galaxy-tabs button {
    width: 26px; height: 22px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #galaxy-tabs button:hover { color: var(--accent); background: rgba(124, 247, 255, 0.05); }
  #galaxy-tabs button.on {
    background: var(--accent);
    color: #02030a;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* ---- theme picker (dropdown) ---- */
  #theme-picker {
    position: fixed;
    top: 14px; left: 14px;
    z-index: 6;
    font-size: 11px;
  }
  #theme-button {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--ink);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    min-width: 180px;
    transition: border-color 0.15s;
  }
  #theme-button:hover { border-color: var(--accent); }
  #theme-button .label {
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #theme-button .name { flex: 1; }
  #theme-button .chevron {
    color: var(--muted);
    font-size: 9px;
    transition: transform 0.15s;
  }
  #theme-picker.open #theme-button .chevron { transform: rotate(180deg); }

  #theme-menu {
    margin-top: 4px;
    background: var(--panel);
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
    display: none;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }
  #theme-picker.open #theme-menu { display: block; }
  #theme-menu .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.1s;
  }
  #theme-menu .item:hover { background: rgba(255, 255, 255, 0.06); }
  #theme-menu .item.on { background: rgba(124, 247, 255, 0.10); }
  #theme-menu .item .swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    flex-shrink: 0;
  }
  #theme-menu .item .name { flex: 1; font-size: 11px; letter-spacing: 0.03em; }
  #theme-menu .item .check {
    color: var(--accent);
    font-size: 11px;
    opacity: 0;
  }
  #theme-menu .item.on .check { opacity: 1; }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="theme-picker">
    <button id="theme-button" type="button" aria-haspopup="listbox" aria-expanded="false">
      <span class="label">Theme</span>
      <span class="name" id="theme-current">—</span>
      <span class="chevron">▾</span>
    </button>
    <div id="theme-menu" role="listbox"></div>
  </div>

  <div id="title">
    APHELION
    <div class="sub">GALACTIC CHART · <span id="galaxyName">—</span> · GALAXY <span id="galaxyNum">1</span> OF 8</div>
  </div>

  <div id="galaxy-tabs"></div>

  <div id="info">
    <div class="stats-row">
      <div class="hero">
        <div class="planet"><canvas id="planetCanvas" width="144" height="144"></canvas></div>
        <div class="hero-text">
          <h2 id="sysName">—</h2>
          <span class="lbl">Coordinates</span>
          <span class="v" id="sysCoords">—</span>
        </div>
      </div>
      <div class="cell">
        <div class="pair">
          <span class="lbl">Economy</span>
          <span class="v" id="sysEcon">—</span>
        </div>
        <div class="pair">
          <span class="lbl">Government</span>
          <span class="v" id="sysGov">—</span>
        </div>
      </div>
      <div class="cell">
        <div class="pair">
          <span class="lbl">Tech Level</span>
          <span class="v" id="sysTech">—</span>
        </div>
        <div class="pair">
          <span class="lbl">Population</span>
          <span class="v" id="sysPop">—</span>
        </div>
      </div>
      <div class="cell">
        <div class="pair">
          <span class="lbl">Productivity</span>
          <span class="v" id="sysProd">—</span>
        </div>
        <div class="pair">
          <span class="lbl">Radius</span>
          <span class="v" id="sysRad">—</span>
        </div>
      </div>
      <div class="cell">
        <div class="pair">
          <span class="lbl">Inhabitants</span>
          <span class="v" id="sysPeople">—</span>
        </div>
        <div class="pair">
          <span class="lbl">Status</span>
          <span class="v" id="sysStatus">—</span>
        </div>
      </div>
    </div>
    <div class="description" id="sysDesc">—</div>
  </div>

  <div id="legend">MOVE MOUSE OR <strong>ARROWS</strong> · <strong>1-8</strong> CHANGE GALAXY</div>

<script type="module">
/* ============================================================================
   APHELION — Galactic Chart
   ----------------------------------------------------------------------------
   Inlined module: galaxy generator + glowing-ASCII renderer.
   Real production code lives in src/galaxy/; this file mirrors that logic
   so the chart can ship as a single HTML file with no build step.
   ============================================================================ */

/* ---- types implicit; this is the JS shape we'd produce from TS ---- */

const SYLLABLES = [
  'AR', 'EN', 'TI', 'OS', 'EX', 'AL', 'IR', 'AN',
  'OR', 'EL', 'US', 'IS', 'AT', 'ON', 'IL', 'EM',
  'XO', 'VE', 'RI', 'KA', 'ME', 'TU', 'ZA', 'GE',
  'NO', 'LA', 'CE', 'PI', 'SO', 'DA', 'BE', 'HE',
];
const GALAXY_PREFIXES = [
  'Sol', 'Ves', 'Aur', 'Lyr', 'Mer', 'Cal', 'Hes', 'Dor',
  'Per', 'Ari', 'Cor', 'Eos', 'Lum', 'Tha', 'Nym', 'Ele',
];
const GALAXY_MIDDLES = [
  'an', 'er', 'ad', 'om', 'al', 'in', 'es', 'on',
  'ar', 'el', 'ir', 'us', 'ol', 'iv', 'um', 'as',
];
const GALAXY_SUFFIXES = ['ia', 'us', 'on', 'is', 'ae', 'or', 'um', 'ix'];

/* ---- themes (mirror of src/theme.ts) ----
   Each role's color may be either a bare hue number (s/l defaulted) or a
   full HSL triple. resolveColor() normalizes both into the same shape.   */
function resolveColor(c) {
  return typeof c === 'number' ? { h: c, s: 90, l: 60 } : c;
}
const THEMES = [
  { id: 'cyan',     name: 'Cyan',
    hues: { hull: 195, planet: 195, dust: 200, frame: 195, dash: 38,
            system: 195, selected: 38, grid: 195, accent: 195, warn: 12 } },
  { id: 'phosphor', name: 'Green Phosphor',
    hues: { hull: 110, planet: 110, dust: 100, frame: 110, dash: 75,
            system: 110, selected: 75, grid: 110, accent: 110, warn: 50 } },
  { id: 'amber',    name: 'Amber Monochrome',
    hues: { hull: 38, planet: 38, dust: 45, frame: 38, dash: 30,
            system: 38, selected: 30, grid: 38, accent: 38, warn: 12 } },
  { id: 'ember',    name: 'Cyan & Amber',
    hues: { hull: 195, planet: 28, dust: 210, frame: 195, dash: 28,
            system: 195, selected: 28, grid: 200, accent: 28, warn: 0 } },
  { id: 'plasma',   name: 'Magenta Synthwave',
    hues: { hull: 290, planet: 290, dust: 270, frame: 290, dash: 320,
            system: 290, selected: 320, grid: 280, accent: 320, warn: 60 } },
  { id: 'spectrum', name: 'Full Color',
    hues: {
      hull:     { h: 210, s: 25, l: 75 },
      planet:   { h: 195, s: 55, l: 60 },
      dust:     { h: 210, s: 15, l: 88 },
      frame:    { h:  30, s: 20, l: 60 },
      dash:     { h: 130, s: 75, l: 60 },
      system:   { h:  50, s: 25, l: 85 },
      selected: { h:  38, s: 95, l: 65 },
      grid:     { h: 210, s: 30, l: 50 },
      accent:   { h:  38, s: 90, l: 65 },
      warn:     { h:   0, s: 95, l: 60 },
    } },
];
const THEME_STORAGE_KEY = 'aphelion.theme';
function loadSavedThemeId() {
  try {
    const v = localStorage.getItem(THEME_STORAGE_KEY);
    if (v && THEMES.some(t => t.id === v)) return v;
  } catch {}
  return THEMES[0].id;
}
function saveThemeId(id) {
  try { localStorage.setItem(THEME_STORAGE_KEY, id); } catch {}
}
function getTheme(id) {
  return THEMES.find(t => t.id === id) ?? THEMES[0];
}
const ECONOMIES = [
  'Rich Industrial', 'Average Industrial', 'Poor Industrial', 'Mainly Industrial',
  'Mainly Agricultural', 'Rich Agricultural', 'Average Agricultural', 'Poor Agricultural',
];
const GOVERNMENTS = [
  'Anarchy', 'Feudal', 'Multi-Government', 'Dictatorship',
  'Communist', 'Confederacy', 'Democracy', 'Corporate State',
];

const APHELION_SEED = [0x5a4a, 0x0248, 0xb753];
const MASK_16 = 0xffff;

function twistOnce([s0, s1, s2]) {
  return [s1, s2, (s0 + s1 + s2) & MASK_16];
}

function rotateGalaxy(triple) {
  return triple.map(n => {
    const hi = (n >> 8) & 0xff, lo = n & 0xff;
    const hiR = ((hi << 1) | (hi >> 7)) & 0xff;
    const loR = ((lo << 1) | (lo >> 7)) & 0xff;
    return (hiR << 8) | loR;
  });
}

function nameFromSeed([s0, s1, s2]) {
  const idx = [
    (s1 >> 8) & 0x1f, s1 & 0x1f,
    (s2 >> 8) & 0x1f, s2 & 0x1f,
  ];
  const lenBits = s0 & 0x3;
  const count = lenBits === 0 ? 2 : lenBits === 3 ? 4 : 3;
  let name = '';
  for (let i = 0; i < count; i++) name += SYLLABLES[idx[i]];
  return name.charAt(0) + name.slice(1).toLowerCase();
}

function galaxyNameFromSeed([s0, s1, s2]) {
  const prefixIdx = (s1 >> 4) & 0xf;
  const middleIdx = (s2 >> 4) & 0xf;
  const suffixIdx = s2 & 0x7;
  const useMiddle = (s0 & 0x4) !== 0;
  let name = GALAXY_PREFIXES[prefixIdx];
  if (useMiddle) name += GALAXY_MIDDLES[middleIdx];
  name += GALAXY_SUFFIXES[suffixIdx];
  return name;
}

function systemFromSeed(seed, index) {
  const [s0, s1, s2] = seed;
  const x = (s0 >> 8) & 0xff;
  const y = (s0 & 0xff) >> 1;

  let econIdx = (s2 >> 8) & 0x7;
  if (y > 96 && econIdx < 4) econIdx += 4;
  if (y < 32 && econIdx >= 4) econIdx -= 4;

  const govIdx = (s1 >> 11) & 0x7;
  const wealthScore = econIdx < 4 ? 4 - econIdx : econIdx - 3;
  const stability = govIdx;
  const noise = (s2 & 0x3) + 1;
  const techLevel = Math.min(15, Math.max(1, stability + wealthScore + noise));
  const population = (techLevel * 4 + stability + econIdx) / 10;
  const productivity = ((stability + 3) * (wealthScore + 4) * 8 + techLevel * 100) | 0;
  const radius = 4000 + (((s2 >> 8) & 0xf) * 256) + (s1 & 0xff);

  return {
    index,
    name: nameFromSeed(seed),
    x, y,
    economy: ECONOMIES[econIdx],
    government: GOVERNMENTS[govIdx],
    techLevel,
    population: Math.round(population * 10) / 10,
    productivity,
    radius,
    seed,
  };
}

function generateGalaxy(startSeed) {
  const systems = [];
  let cur = startSeed;
  for (let i = 0; i < 256; i++) {
    cur = twistOnce(cur);
    systems.push(systemFromSeed(cur, i));
  }
  return { name: galaxyNameFromSeed(startSeed), systems };
}

function generateAllGalaxies() {
  const out = [];
  let seed = APHELION_SEED;
  for (let g = 0; g < 8; g++) {
    out.push(generateGalaxy(seed));
    seed = rotateGalaxy(seed);
  }
  return out;
}

/* ---- description generator (mirror of src/galaxy/describe.ts) ----
   Recursive grammar driven by a per-system PRNG. Same system always
   produces the same description because the PRNG is seeded by the
   system's seed triple.                                                */
const DESC = {
  pleasant: ['fabled','remarkable','renowned','celebrated','unusual','curious',
             'splendid','storied','beguiling','idyllic','breathtaking','serene'],
  grim: ['forsaken','troubled','unforgiving','inhospitable','sweltering',
         'frigid','plague-ridden','lawless','restless','crumbling'],
  neutral: ['peculiar','unconventional','odd','sleepy','quiet','ordinary',
            'unassuming','modest','small','sprawling'],
  features: ['oceans','mountains','deserts','glaciers','crystal forests',
             'singing caves','salt plains','lava tubes','mist gardens',
             'iron jungles','amber lakes','wind valleys'],
  cultural: ['three suns','twin moons','rings of dust','low gravity','long winters',
             'unusual tides','permanent twilight','extraordinary storms'],
  products: ['cuisine','wines','tea','spices','silks','glasswork','pottery',
             'poetry','mathematics','shipwrights','clockmakers','tailors'],
  grimCrafts: ['mercenaries','smugglers','forgers','pirates','tax collectors',
               'bureaucrats','lawyers','inspectors'],
  creatures: ['beetles','fish','birds','lizards','crabs','wolves','cats',
              'rabbits','jellyfish','turtles'],
  cQual: ['venomous','enormous','invisible','singing','philosophical',
          'territorial','short-tempered','remarkably patient','extremely small',
          'mildly poisonous'],
  absurd: ['its inhabitants greet each other by reciting prime numbers',
           'tourists are required to register their dreams on arrival',
           'the official language has no past tense',
           'all music is performed underwater',
           'the planetary clock runs backwards on Tuesdays',
           'every meal is preceded by a thirty-minute apology',
           'the local currency is a kind of cheese',
           'no two clouds are alike, by law',
           'public speaking is illegal between sunset and midnight',
           'the mail is delivered exclusively by trained crows'],
  hazards: ['the local ground crews','the orbital traffic','the ash storms',
            'the customs officers','the unpredictable suns','the corporate police',
            'the wild moons'],
  famousFor: ['famous for','renowned for','best known for','celebrated for',
              'notorious for','occasionally remembered for'],
  homeTo: ['home to','the birthplace of','where you can find','the only place with'],
};

function makeDescRng(seed) {
  let state = (seed[0] ^ (seed[1] << 8) ^ (seed[2] << 16) ^ (seed[0] << 24)) >>> 0;
  for (let i = 0; i < 4; i++) state = (Math.imul(state, 1664525) + 1013904223) >>> 0;
  return {
    next() { state = (Math.imul(state, 1664525) + 1013904223) >>> 0; return state; },
    pick(arr) { return arr[this.next() % arr.length]; },
    chance(p) { return (this.next() & 0xffff) / 0x10000 < p; },
  };
}

function adjPool(sys) {
  const wealthy = sys.economy.startsWith('Rich') || sys.economy.startsWith('Average');
  const stable = sys.government === 'Democracy' || sys.government === 'Corporate State' || sys.government === 'Confederacy';
  const dangerous = sys.government === 'Anarchy' || sys.government === 'Feudal' ||
    sys.economy === 'Poor Industrial' || sys.economy === 'Poor Agricultural';
  if (dangerous) return DESC.grim;
  if (wealthy && stable) return DESC.pleasant;
  return DESC.neutral;
}
function craftPool(sys) {
  return (sys.government === 'Anarchy' || sys.government === 'Feudal') ? DESC.grimCrafts : DESC.products;
}
function inhabitants(name, rng) {
  const last = name[name.length - 1].toLowerCase();
  const isVowel = 'aeiou'.includes(last);
  const sfx = isVowel ? ['ans','ites','ese','ari'] : ['ans','ites','ians','oids'];
  return name + rng.pick(sfx);
}

function describeSystem(sys) {
  const r = makeDescRng(sys.seed);
  const adj = r.pick(adjPool(sys));
  const a = /^[aeiou]/i.test(adj) ? 'an' : 'a';
  const t1 = [
    () => `${sys.name} is ${a} ${adj} world ${r.pick(DESC.famousFor)} its ${r.pick(DESC.features)}.`,
    () => `${sys.name} is ${r.pick(DESC.famousFor)} its ${r.pick(DESC.features)} and its ${r.pick(DESC.cultural)}.`,
    () => `${sys.name} is ${a} ${adj} place — ${r.pick(DESC.homeTo)} the galaxy's most ${r.pick(DESC.cQual)} ${r.pick(DESC.creatures)}.`,
    () => `${sys.name} is ${r.pick(DESC.famousFor)} its ${r.pick(craftPool(sys))} and ${r.pick(craftPool(sys))}.`,
  ];
  let out = r.pick(t1)();

  if (r.chance(0.66)) {
    const who = inhabitants(sys.name, r);
    const t2weighted = [
      [3, () => `The ${who} are ${r.pick(DESC.famousFor)} their ${r.pick(craftPool(sys))}.`],
      [2, () => `Visitors are advised to beware of ${r.pick(DESC.hazards)}, but the ${who} are friendly enough.`],
      [3, () => `It is said that ${r.pick(DESC.absurd)}.`],
      [2, () => `The ${who} have a peculiar fondness for ${r.pick(DESC.creatures)}.`],
      [1, () => `The ${who} prefer not to discuss it.`],
      [2, () => `The ${who} are ${r.pick(DESC.famousFor)} their ${r.pick(DESC.cQual)} ${r.pick(DESC.creatures)}.`],
    ];
    const pool = [];
    for (const [w, fn] of t2weighted) for (let i = 0; i < w; i++) pool.push(fn);
    out += ' ' + r.pick(pool)();
  }
  return out;
}

/* ---- short status string derived from system properties ----
   Compresses economy + government into a short evocative phrase that
   fits in a single cell without wrapping. Designed to feel like a
   ship's-log shorthand: "Lawless", "Prosperous", "Stable Trade".     */
function systemStatus(sys) {
  const danger = sys.government === 'Anarchy' || sys.government === 'Feudal';
  const safe = sys.government === 'Corporate State' || sys.government === 'Democracy';
  const rich = sys.economy.startsWith('Rich');
  const poor = sys.economy.startsWith('Poor');
  if (danger && poor) return 'Hazardous';
  if (danger) return 'Lawless';
  if (safe && rich) return 'Prosperous';
  if (safe) return 'Stable';
  if (poor) return 'Struggling';
  if (rich) return 'Thriving';
  return 'Settled';
}

/* ---- procedural planet renderer ----
   Each system gets a small disc drawn into the hero canvas, with surface
   patterns derived from the seed so every planet looks distinct. We use
   the same glowing-ASCII technique as the chart: glyphs from a ramp,
   intensity per pixel, plus a couple of bloom passes via canvas filter.

   The visual vocabulary:
     - A circular silhouette (the limb) — every planet has one.
     - One or two arc bands — meridian-like lines that imply a 3D sphere.
     - Speckled surface "features" — bright spots scattered inside the
       disc, with density tied to population.

   Colors come from the active theme's planet hue (and dust hue for the
   highlight side of the limb).                                         */
const planetCanvas = document.getElementById('planetCanvas');
const planetCtx = planetCanvas.getContext('2d');

function drawPlanet(sys) {
  const w = planetCanvas.width, h = planetCanvas.height;
  planetCtx.clearRect(0, 0, w, h);

  const theme = getTheme(state.themeId);
  const baseColor = resolveColor(theme.hues.planet);
  const limbColor = resolveColor(theme.hues.dust);

  // Reuse the same PRNG style as the description generator so the planet
  // visual is deterministic from the seed and stable across renders.
  const r = makeDescRng(sys.seed);

  const cx = w / 2, cy = h / 2;
  const radius = Math.min(w, h) * 0.42;

  // Cells in a small grid — keep this independent of the chart cell size.
  const cell = 6;
  const cols = Math.ceil(w / cell);
  const rows = Math.ceil(h / cell);
  const grid = new Float32Array(cols * rows);

  // 1. Draw the limb as a circle of points
  const limbSteps = Math.PI * 2 / 0.04;
  for (let a = 0; a < Math.PI * 2; a += 0.04) {
    const px = cx + Math.cos(a) * radius;
    const py = cy + Math.sin(a) * radius;
    const gx = Math.round(px / cell), gy = Math.round(py / cell);
    if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) continue;
    // Brighter on the side opposite the "sun" (we pretend a light source
    // is up-left). Side facing it is dimmer because backlit.
    const lightDot = -Math.cos(a) * 0.7 - Math.sin(a) * 0.7; // -1..1
    const v = 0.55 + lightDot * 0.4;
    grid[gy * cols + gx] = Math.max(grid[gy * cols + gx], v);
  }

  // 2. One or two meridian arcs — gives the impression of a 3D sphere
  const arcCount = 1 + (r.next() % 2);
  for (let m = 0; m < arcCount; m++) {
    // Each meridian is an ellipse with random eccentricity, simulating a
    // great circle at some angle to the viewer.
    const tilt = (r.next() % 1000) / 1000 * Math.PI;
    const squish = 0.2 + (r.next() % 100) / 100 * 0.7;  // ellipse aspect
    for (let a = 0; a < Math.PI * 2; a += 0.06) {
      const lx = Math.cos(a) * radius * 0.95;
      const ly = Math.sin(a) * radius * 0.95 * squish;
      // rotate by tilt
      const rx = lx * Math.cos(tilt) - ly * Math.sin(tilt);
      const ry = lx * Math.sin(tilt) + ly * Math.cos(tilt);
      const px = cx + rx, py = cy + ry;
      // Only plot if inside the disc (gives the "wraps around the sphere"
      // illusion — far side hidden).
      const distFromCenter = Math.hypot(px - cx, py - cy);
      if (distFromCenter > radius * 0.95) continue;
      const gx = Math.round(px / cell), gy = Math.round(py / cell);
      if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) continue;
      const idx = gy * cols + gx;
      if (0.45 > grid[idx]) grid[idx] = 0.45;
    }
  }

  // 3. Surface speckles — number scaled by population (richer worlds
  // get more visible cities). Capped so it never overwhelms the limb.
  const speckles = Math.min(40, Math.floor(sys.population * 3 + 8));
  for (let i = 0; i < speckles; i++) {
    // Pick a point inside the disc
    const a = (r.next() % 10000) / 10000 * Math.PI * 2;
    const dist = Math.sqrt((r.next() % 10000) / 10000) * radius * 0.85;
    const px = cx + Math.cos(a) * dist;
    const py = cy + Math.sin(a) * dist;
    const gx = Math.round(px / cell), gy = Math.round(py / cell);
    if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) continue;
    const idx = gy * cols + gx;
    const v = 0.6 + (r.next() % 100) / 100 * 0.35;
    if (v > grid[idx]) grid[idx] = v;
  }

  // Render the grid as glyphs.
  planetCtx.font = `${cell - 1}px ui-monospace, "JetBrains Mono", monospace`;
  planetCtx.textBaseline = 'middle';
  planetCtx.textAlign = 'center';

  // Two passes: sharp + blurred-additive bloom.
  const passes = ['sharp', 'bloom'];
  for (const pass of passes) {
    if (pass === 'bloom') {
      planetCtx.filter = 'blur(3px)';
      planetCtx.globalCompositeOperation = 'lighter';
      planetCtx.globalAlpha = 0.55;
    }
    for (let gy = 0; gy < rows; gy++) {
      for (let gx = 0; gx < cols; gx++) {
        const v = grid[gy * cols + gx];
        if (v < 0.1) continue;
        const ch = ramp[Math.min(ramp.length - 1, Math.floor(v * ramp.length))];
        const x = gx * cell + cell / 2, y = gy * cell + cell / 2;
        // Limb cells (those at radius edge) tint toward dust color so we
        // get a slight "rim light" effect; interior uses the planet hue.
        const distFromCenter = Math.hypot(x - cx, y - cy);
        const isLimb = distFromCenter > radius * 0.85;
        const c = isLimb ? limbColor : baseColor;
        const light = Math.max(20, Math.min(95, c.l - 15 + v * 40));
        planetCtx.fillStyle = `hsl(${c.h}, ${c.s}%, ${light}%)`;
        planetCtx.fillText(ch, x, y);
      }
    }
  }
  planetCtx.filter = 'none';
  planetCtx.globalCompositeOperation = 'source-over';
  planetCtx.globalAlpha = 1;
}

   Renderer — same glowing-ASCII pipeline as before, applied to the chart.

const stage = document.getElementById('stage');

const state = {

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.max(1, Math.floor(innerWidth * dpr));
  const h = Math.max(1, Math.floor(innerHeight * dpr));
  stage.width = w; stage.height = h;
  stage.style.width = innerWidth + 'px';
  stage.style.height = innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener('resize', resize);

/* ---- apply theme to CSS variables ----
   The panels, title, info boxes etc. use CSS variables so changing the
   theme is just a matter of updating those vars. The renderer's bloom
   pipeline reads from the JS theme object directly.                    */
function applyThemeToCss(theme) {
  const root = document.documentElement;
  const accent = resolveColor(theme.hues.accent);
  const warn = resolveColor(theme.hues.warn);
  // accent: bright, used for active highlights (info heading, glow on titles)
  root.style.setProperty('--accent', `hsl(${accent.h}, ${accent.s}%, ${Math.min(95, accent.l + 10)}%)`);
  // ink: the ordinary readable foreground; slight tint of the accent
  root.style.setProperty('--ink', `hsl(${accent.h}, ${Math.min(40, accent.s)}%, 88%)`);
  // border: very dim accent
  root.style.setProperty('--border', `hsla(${accent.h}, ${Math.min(70, accent.s)}%, 65%, 0.22)`);
  // muted: lower-priority text
  root.style.setProperty('--muted', `hsl(${accent.h}, 18%, 55%)`);
  // warn: alerts and low-tech systems
  root.style.setProperty('--warn', `hsl(${warn.h}, ${warn.s}%, ${warn.l + 5}%)`);
}
applyThemeToCss(getTheme(state.themeId));

/* ---- coordinate mapping: chart space -> screen space ----
   The chart's drawable region is the window minus the title at top and
   the horizontal info strip at the bottom. The strip spans full width,
   so we just shrink the bottom margin to its height plus a little
   breathing room. Sizes here mirror the CSS — keep in sync.            */
const PANEL_HEIGHT = 168;     // #info height
const TITLE_HEIGHT = 80;      // top margin (title + galaxy tabs)
function chartBounds() {
  const marginX = 60;
  const marginBottom = PANEL_HEIGHT + 16;
  return {
    x0: marginX,
    y0: TITLE_HEIGHT,
    x1: innerWidth - marginX,
    y1: innerHeight - marginBottom,
  };
}
function chartToScreen(cx, cy) {
  const b = chartBounds();
  return [
    b.x0 + (cx / 255) * (b.x1 - b.x0),
    b.y0 + (cy / 127) * (b.y1 - b.y0),
  ];
}
function screenToChart(sx, sy) {
  const b = chartBounds();
  return [
    Math.max(0, Math.min(255, ((sx - b.x0) / (b.x1 - b.x0)) * 255)),
    Math.max(0, Math.min(127, ((sy - b.y0) / (b.y1 - b.y0)) * 127)),
  ];
}

/* ---- input ---- */
addEventListener('mousemove', e => {
  const [cx, cy] = screenToChart(e.clientX, e.clientY);
  state.cursor.x = cx;
  state.cursor.y = cy;
});
addEventListener('keydown', e => {
  const step = 4;
  if (e.key === 'ArrowLeft')  state.cursor.x = Math.max(0, state.cursor.x - step);
  if (e.key === 'ArrowRight') state.cursor.x = Math.min(255, state.cursor.x + step);
  if (e.key === 'ArrowUp')    state.cursor.y = Math.max(0, state.cursor.y - step);
  if (e.key === 'ArrowDown')  state.cursor.y = Math.min(127, state.cursor.y + step);
  if (e.key >= '1' && e.key <= '8') setGalaxy(parseInt(e.key, 10) - 1);
});

/* ---- offscreen color buckets for clean per-color bloom ---- */
const buckets = {};
function getBucket(name) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.max(1, stage.width || Math.floor(innerWidth * dpr));
  const h = Math.max(1, stage.height || Math.floor(innerHeight * dpr));
  if (!buckets[name] || buckets[name].canvas.width !== w || buckets[name].canvas.height !== h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const cx = c.getContext('2d');
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buckets[name] = { canvas: c, ctx: cx };
  }
  return buckets[name];
}

const ramp = " .·:-=+*#%@█";

/* ---- nearest-system lookup ---- */
function nearestSystem(cx, cy) {
  const systems = state.galaxies[state.galaxyIdx].systems;
  let best = null, bestD = Infinity;
  for (const s of systems) {
    const dx = s.x - cx, dy = s.y - cy;
    const d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; best = s; }
  }
  return best;
}

/* ---- main render loop ---- */
let last = performance.now();

function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  state.t += dt;

  const W = innerWidth, H = innerHeight;
  const cell = state.cellSize;
  const cols = Math.ceil(W / cell);
  const rows = Math.ceil(H / cell);

  ctx.fillStyle = 'rgba(2, 3, 10, 1)';
  ctx.fillRect(0, 0, W, H);

  // separate intensity grids: one per color bucket
  const gSystem = new Float32Array(cols * rows);   // unselected systems
  const gSelected = new Float32Array(cols * rows); // the system under the cursor
  const gCursor = new Float32Array(cols * rows);   // crosshair
  const gGrid = new Float32Array(cols * rows);     // chart background grid

  /* --- chart background grid (very dim) --- */
  const b = chartBounds();
  // dotted vertical lines every 32 chart units
  for (let cx = 0; cx <= 255; cx += 32) {
    const [sx] = chartToScreen(cx, 0);
    const gx = Math.round(sx / cell);
    for (let gy = Math.floor(b.y0 / cell); gy < Math.ceil(b.y1 / cell); gy += 2) {
      if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) {
        gGrid[gy * cols + gx] = 0.18;
      }
    }
  }
  for (let cy = 0; cy <= 127; cy += 16) {
    const [, sy] = chartToScreen(0, cy);
    const gy = Math.round(sy / cell);
    for (let gx = Math.floor(b.x0 / cell); gx < Math.ceil(b.x1 / cell); gx += 2) {
      if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) {
        gGrid[gy * cols + gx] = 0.18;
      }
    }
  }

  /* --- find nearest system to cursor --- */
  const nearest = nearestSystem(state.cursor.x, state.cursor.y);
  state.selected = nearest;

  /* --- plot all systems --- */
  const systems = state.galaxies[state.galaxyIdx].systems;
  for (const sys of systems) {
    const [sx, sy] = chartToScreen(sys.x, sys.y);
    const gx = Math.round(sx / cell);
    const gy = Math.round(sy / cell);
    if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) continue;

    // System brightness scales with tech level — a tiny visual hint
    // about which systems are advanced. tech 1 -> 0.45, tech 15 -> 0.95.
    const brightness = 0.45 + (sys.techLevel / 15) * 0.5;

    const isSelected = sys === nearest;
    const grid = isSelected ? gSelected : gSystem;
    const idx = gy * cols + gx;
    if (brightness > grid[idx]) grid[idx] = brightness;

    // selected system gets a faint halo of nearby cells too
    if (isSelected) {
      for (const [ox, oy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const x = gx + ox, y = gy + oy;
        if (x < 0 || x >= cols || y < 0 || y >= rows) continue;
        const v = 0.55 + 0.2 * Math.sin(state.t * 4);
        if (v > gSelected[y * cols + x]) gSelected[y * cols + x] = v;
      }
    }
  }

  /* --- cursor crosshair --- */
  if (nearest) {
    const [sx, sy] = chartToScreen(nearest.x, nearest.y);
    const gx = Math.round(sx / cell);
    const gy = Math.round(sy / cell);
    const armLen = 4;
    const gap = 2;
    const pulse = 0.7 + 0.3 * Math.sin(state.t * 6);
    for (let i = gap; i <= gap + armLen; i++) {
      const cells = [
        [gx - i, gy], [gx + i, gy],
        [gx, gy - i], [gx, gy + i],
      ];
      for (const [x, y] of cells) {
        if (x < 0 || x >= cols || y < 0 || y >= rows) continue;
        const idx = y * cols + x;
        // Cursor brightness fades from inner to outer
        const fade = 1 - ((i - gap) / armLen) * 0.5;
        const v = pulse * fade;
        if (v > gCursor[idx]) gCursor[idx] = v;
      }
    }
  }

  /* --- render: pick brightest grid per cell, draw to bucket --- */
  const theme = getTheme(state.themeId);
  const layers = [
    { name: 'grid',    grid: gGrid,     color: resolveColor(theme.hues.grid)     },
    { name: 'system',  grid: gSystem,   color: resolveColor(theme.hues.system)   },
    { name: 'selected',grid: gSelected, color: resolveColor(theme.hues.selected) },
    { name: 'cursor',  grid: gCursor,   color: resolveColor(theme.hues.selected) },
  ];
  for (const L of layers) {
    const b = getBucket(L.name);
    b.ctx.clearRect(0, 0, W, H);
    b.ctx.font = `${cell - 1}px ui-monospace, "JetBrains Mono", monospace`;
    b.ctx.textBaseline = 'middle';
    b.ctx.textAlign = 'center';
  }
  ctx.font = `${cell - 1}px ui-monospace, "JetBrains Mono", monospace`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';

  for (let gy = 0; gy < rows; gy++) {
    for (let gx = 0; gx < cols; gx++) {
      const idx = gy * cols + gx;
      let bestV = 0, bestL = null;
      for (const L of layers) {
        if (L.grid[idx] > bestV) { bestV = L.grid[idx]; bestL = L; }
      }
      if (bestV < 0.06) continue;
      const ch = ramp[Math.min(ramp.length - 1, Math.floor(bestV * ramp.length))];
      const x = gx * cell + cell / 2, y = gy * cell + cell / 2;
      // Modulate the role's base lightness by the cell's intensity:
      // intensity 0 -> base*0.7, intensity 1 -> base+~25 (clamped).
      // This lets the glow ramp work over any base lightness, not just one.
      const base = bestL.color;
      const light = Math.max(20, Math.min(95, base.l - 15 + bestV * 40));

      ctx.fillStyle = `hsl(${base.h}, ${base.s}%, ${light}%)`;
      ctx.fillText(ch, x, y);

      const buck = getBucket(bestL.name);
      // Bloom layer is rendered slightly brighter so the additive blur reads.
      buck.ctx.fillStyle = `hsl(${base.h}, ${Math.min(100, base.s + 5)}%, ${Math.min(95, light + 18)}%)`;
      buck.ctx.fillText(ch, x, y);
    }
  }

  /* --- bloom passes per bucket --- */
  if (state.glow > 0.01) {
    ctx.globalCompositeOperation = 'lighter';
    const passes = [
      { blur: 2,  alpha: 0.65 },
      { blur: 6,  alpha: 0.55 },
      { blur: 16, alpha: 0.45 },
      { blur: 36, alpha: 0.30 },
    ];
    for (const L of layers) {
      const buck = getBucket(L.name);
      if (!buck.canvas.width || !buck.canvas.height) continue;
      for (const p of passes) {
        ctx.filter = `blur(${p.blur}px)`;
        ctx.globalAlpha = p.alpha * state.glow;
        ctx.drawImage(buck.canvas, 0, 0, W, H);
      }
    }
    ctx.filter = 'none';
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  /* --- update info panel --- */
  if (nearest) {
    document.getElementById('sysName').textContent = nearest.name;
    document.getElementById('sysCoords').textContent = `${nearest.x}, ${nearest.y}`;
    document.getElementById('sysEcon').textContent = nearest.economy;
    document.getElementById('sysGov').textContent = nearest.government;
    const techEl = document.getElementById('sysTech');
    techEl.textContent = nearest.techLevel.toString();
    techEl.classList.toggle('warn', nearest.techLevel < 4);
    document.getElementById('sysPop').textContent = `${nearest.population.toFixed(1)} B`;
    document.getElementById('sysProd').textContent = nearest.productivity.toLocaleString();
    document.getElementById('sysRad').textContent = `${nearest.radius.toLocaleString()} km`;

    // Inhabitants demonym + status. Use a tiny dedicated rng seeded from
    // the system so values stay stable across frames.
    const peopleRng = makeDescRng(nearest.seed);
    document.getElementById('sysPeople').textContent = inhabitants(nearest.name, peopleRng);
    document.getElementById('sysStatus').textContent = systemStatus(nearest);

    document.getElementById('sysDesc').textContent = describeSystem(nearest);

    // Redraw the planet only when the selected system changes — it's
    // expensive and constant per system.
    if (state.lastPlanetSystem !== nearest) {
      drawPlanet(nearest);
      state.lastPlanetSystem = nearest;
    }
  }

  requestAnimationFrame(frame);
}
